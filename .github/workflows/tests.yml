name: Code Quality Checks

on:
  push:
    branches:
      - '**'   # <-- Wrapping it in quotes fixes the syntax crash!
  pull_request:
    branches:
      - main

jobs:
  lint_and_format:
    runs-on: ubuntu-latest
    steps:
    - uses: "actions/checkout@v4"
    - uses: "home-assistant/actions/hassfest@master"
    
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        
    - name: HACS Action
      uses: hacs/action@22.5.0
      with:
          category: integration

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black

    - name: Check for Python Syntax Errors
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Auto-Format Code with Black
      run: |
        black .

    - name: Commit and Push Formatted Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Apply automatic Black code formatting"

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check custom_components/"
