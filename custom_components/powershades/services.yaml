toggle_shade:
  name: Toggle Shade
  description: Toggle the shade between open and closed positions (stops it if moving)
  fields:
    entity_id:
      name: Entity
      description: The PowerShades cover entity to toggle
      example: "cover.powershade_living_room"
      required: true
      selector:
        entity:
          domain: cover
          integration: powershades

set_upper_limit:
  name: Set Upper Limit
  description: Set the upper limit (fully open position) for a PowerShades device
  fields:
    entity_id:
      name: Entity
      description: The PowerShades cover entity to set the limit for
      example: "cover.powershade_living_room"
      required: true
      selector:
        entity:
          domain: cover
          integration: powershades

set_lower_limit:
  name: Set Lower Limit
  description: Set the lower limit (fully closed position) for a PowerShades device
  fields:
    entity_id:
      name: Entity
      description: The PowerShades cover entity to set the limit for
      example: "cover.powershade_living_room"
      required: true
      selector:
        entity:
          domain: cover
          integration: powershades

clear_limits:
  name: Clear Limits
  description: Clear both upper and lower limits for a PowerShades device
  fields:
    entity_id:
      name: Entity
      description: The PowerShades cover entity to clear limits for
      example: "cover.powershade_living_room"
      required: true
      selector:
        entity:
          domain: cover
          integration: powershades

step_up:
  name: Step Up
  description: Move the motor up one step (for trimming limits)
  fields:
    entity_id:
      name: Entity
      description: The PowerShades cover entity to step
      example: "cover.powershade_living_room"
      required: true
      selector:
        entity:
          domain: cover
          integration: powershades

step_down:
  name: Step Down
  description: Move the motor down one step (for trimming limits)
  fields:
    entity_id:
      name: Entity
      description: The PowerShades cover entity to step
      example: "cover.powershade_living_room"
      required: true
      selector:
        entity:
          domain: cover
          integration: powershades

jog_up:
  name: Jog Up
  description: Move the shade up continuously until it reaches a limit or is stopped (useful when setting limits)
  fields:
    entity_id:
      name: Entity
      description: The PowerShades cover entity to jog
      example: "cover.powershade_living_room"
      required: true
      selector:
        entity:
          domain: cover
          integration: powershades

jog_down:
  name: Jog Down
  description: Move the shade down continuously until it reaches a limit or is stopped (useful when setting limits)
  fields:
    entity_id:
      name: Entity
      description: The PowerShades cover entity to jog
      example: "cover.powershade_living_room"
      required: true
      selector:
        entity:
          domain: cover
          integration: powershades

set_shade_name:
  name: Set Shade Name
  description: Rename a PoE shade on the device itself (1-50 ASCII characters); the Home Assistant device name is updated to match
  fields:
    entity_id:
      name: Entity
      description: The PowerShades cover entity to rename
      example: "cover.powershade_living_room"
      required: true
      selector:
        entity:
          domain: cover
          integration: powershades
    name:
      name: Name
      description: The new shade name
      example: "Living Room Left"
      required: true
      selector:
        text:
